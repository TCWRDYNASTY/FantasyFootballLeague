<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCWR FANTASY FOOTBALL DY-NASTY MANAGER RANKINGS</title>
    
<style>
    /* 1. Global Reset - Prevents layout breaking from padding/borders */
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }

    body { 
        background-color: #1a202c; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        color: white; 
        margin: 0; 
        padding: 0;
        /* Padding at bottom so content doesn't get cut off behind the floating button container */
        padding-bottom: 100px; 
    }

    /* 2. Responsive Grid - Lowered minmax to 300px for mobile safety */
    .ranking-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
        width: 95%;
        max-width: 1400px;
        margin: 40px auto;
        align-items: start; /* Prevents cards from stretching to match heights unevenly */
    }

    .ranking-card {
        background-color: #2d3748;
        border: 3px solid #4a5568;
        border-radius: 12px;
        padding: 24px 20px;
        position: relative;
        display: flex;
        flex-direction: column;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        min-height: 320px; /* Ensures consistent look during loading */
    }

    .ranking-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    /* Rank Highlights - Gold/Silver/Bronze */
    .ranking-card[data-rank="1"] { border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
    .ranking-card[data-rank="2"] { border-color: #C0C0C0; }
    .ranking-card[data-rank="3"] { border-color: #CD7F32; }

    /* Rank Circle Fix */
    .rank-number {
        position: absolute;
        top: -15px;
        left: -15px;
        background: #1a202c;
        color: #FFD700;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 3px solid currentColor;
        font-weight: 800;
        font-family: 'Courier New', monospace;
        z-index: 2;
    }

    .manager-info { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
    .real-name { font-size: 1.5rem; font-weight: 800; display: block; color: #f7fafc; }

    .total-score { font-size: 2rem; color: #4ade80; margin: 10px 0; font-weight: 800; }
    .total-score span { font-size: 0.9rem; color: #cbd5e0; font-weight: 400; }

    .stats-sub-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 8px;
        margin-top: auto; /* Pushes stats to the bottom of the card */
    }

    .stat-item { display: flex; flex-direction: column; }
    .stat-label { font-size: 0.65rem; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .stat-value { font-size: 1.1rem; font-weight: 700; color: #FFD700; }

    /* Progress Bar */
    .win-bar-container {
        width: 100%;
        height: 10px;
        background: #1a202c;
        border-radius: 5px;
        margin-top: 20px;
        overflow: hidden;
    }
    .win-bar-fill { 
        height: 100%; 
        background: linear-gradient(90deg, #2d3748, #4ade80); 
        transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    /* Info Card Specifics */
    .info-card { border-color: #4ade80; background-color: #1e293b; }
    .info-header { font-size: 1.5rem; font-weight: 800; color: #4ade80; margin-bottom: 8px; }
    .info-desc { font-size: 0.9rem; color: #cbd5e0; font-style: italic; margin-bottom: 15px; line-height: 1.5; }
    .weight-total { color: #4ade80; font-weight: 800; font-size: 1.3rem; margin-top: 15px; text-align: right; border-top: 2px solid #2d3748; padding-top: 10px; }

    /* --- Floating Action Button Elements --- */
    .footer-action-container {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top, rgba(26,32,44,1) 70%, rgba(26,32,44,0));
        padding: 20px 0;
        display: flex;
        justify-content: center;
        z-index: 100;
    }

    .embed-trigger-btn {
        background-color: #4ade80;
        color: #1a202c;
        font-size: 1rem;
        font-weight: 800;
        padding: 14px 28px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        transition: transform 0.2s, background-color 0.2s;
    }

    .embed-trigger-btn:hover {
        background-color: #38bdf8; /* Accent dynamic shift to blue on hover */
        transform: scale(1.05);
    }

    /* --- Hidden Modal Structure --- */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .modal-content {
        background-color: #1e293b;
        width: 90%;
        max-width: 1200px;
        height: 80vh;
        border-radius: 16px;
        border: 2px solid #4b5563;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        transform: translateY(20px);
        transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
        transform: translateY(0);
    }

    .modal-header {
        background-color: #0f172a;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #334155;
    }

    .modal-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
        color: #f8fafc;
    }

    .modal-close-btn {
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.75rem;
        cursor: pointer;
        line-height: 1;
        transition: color 0.2s;
    }

    .modal-close-btn:hover {
        color: #ef4444;
    }

    .modal-body {
        flex: 1;
        width: 100%;
        height: 100%;
    }

    .modal-body iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Mobile Cleanup */
    @media (max-width: 600px) {
        .ranking-grid { gap: 35px; margin-top: 50px; }
        .ranking-card { padding: 20px 15px; }
        .modal-content { width: 95%; height: 85vh; }
    }
</style>
</head>

<body>

<div class="ranking-grid" id="leaderboard">
    <p style="text-align: center; grid-column: 1/-1;">Loading rankings...</p>
</div>

<div class="footer-action-container">
    <button class="embed-trigger-btn" id="openModalBtn">Full Manager Rankings</button>
</div>

<div class="modal-overlay" id="sheetModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Full Manager Rankings Spreadsheet</h3>
            <button class="modal-close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQjIjcUVkLUwsSErcmBR-WHYSu6WxbAlckp2oZOGkDQFoqea7El8QLa2shDlyrUPSAXZtv89DzcMcvk/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
    </div>
</div>

<script>
// 1. The Direct Source - No proxy needed for Published Google Sheets
const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjIjcUVkLUwsSErcmBR-WHYSu6WxbAlckp2oZOGkDQFoqea7El8QLa2shDlyrUPSAXZtv89DzcMcvk/pub?gid=242455735&single=true&output=csv';

async function fetchAndDisplayRankings() {
    console.log("Status: Fetching CSV data directly..."); 
    try {
        // Fetching directly from Google
        const response = await fetch(sheetUrl); 
        
        if (!response.ok) throw new Error(`Network error: ${response.status}`);

        const csvText = await response.text(); 
        
        // 2. The Parser
        const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "").map(row => {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(cell => cell.replace(/^"(.*)"$/, '$1').trim()) : [];
        });

        const container = document.getElementById('leaderboard');
        container.innerHTML = "";

       // 3. The Loop (Starting at Row 4 / Index 3)
        for (let i = 3; i < rows.length; i++) {
            const col = rows[i];
            
            // Skip rows that don't have a valid Rank in Column A
            if (!col[0] || isNaN(col[0])) continue; 

            const rank = col[0];        // Column A (Index 0)
            const manager = col[1];     // Column B (Index 1)
            const totalScore = col[2];  // Column C (Index 2)
            
            // Shifting indices to fix the "one column to the right" issue
            const winPctPts = col[6];   // Column H 
            const tpfPts = col[8];      // Column J (Index 9)
            const tpaPts = col[10];     // Column L (Index 11)
            const playoffPts = col[12]; // Column N (Index 13)
            const champAppPts = col[14];// Column P (Index 15)
            const ringsPts = col[16];   // Column R (Index 17)

            container.innerHTML += `
                <div class="ranking-card" data-rank="${rank}">
                    <div class="rank-number">${rank}</div>
                    <div class="manager-info">
                        <span class="real-name">${manager}</span>
                    </div>
                    <div class="total-score">${totalScore} <span>/ 10</span></div>
                    
                    <div class="stats-sub-grid">
                        <div class="stat-item"><span class="stat-label">Win %</span><span class="stat-value">${winPctPts}</span></div>
                        <div class="stat-item"><span class="stat-label">TPF</span><span class="stat-value">${tpfPts}</span></div>
                        <div class="stat-item"><span class="stat-label">TPA</span><span class="stat-value">${tpaPts}</span></div>
                        <div class="stat-item"><span class="stat-label">Playoffs</span><span class="stat-value">${playoffPts}</span></div>
                        <div class="stat-item"><span class="stat-label">Champ App</span><span class="stat-value">${champAppPts}</span></div>
                        <div class="stat-item"><span class="stat-label">Rings</span><span class="stat-value">${ringsPts}</span></div>
                    </div>

                    <div class="win-bar-container">
                        <div class="win-bar-fill" style="width: ${parseFloat(totalScore) * 10}%"></div>
                    </div>
                </div>`;
        }
        container.innerHTML += `
            <div class="ranking-card info-card">
                <div class="info-header">Point Assignment</div>
                <div class="info-desc">Rankings are weighted based on total performance.</div>
                <div class="stats-sub-grid">
                    <div class="stat-item"><span class="stat-label">Win %</span><span class="stat-value">2.0</span></div>
                    <div class="stat-item"><span class="stat-label">TPF</span><span class="stat-value">2.0</span></div>
                    <div class="stat-item"><span class="stat-label">TPA</span><span class="stat-value">1.5</span></div>
                    <div class="stat-item"><span class="stat-label">Playoffs</span><span class="stat-value">1.5</span></div>
                    <div class="stat-item"><span class="stat-label">Champ App</span><span class="stat-value">1.0</span></div>
                    <div class="stat-item"><span class="stat-label">Rings</span><span class="stat-value">2.0</span></div>
                </div>
            </div>`;

    } catch (error) {
        console.error("Critical Error:", error);
        document.getElementById('leaderboard').innerHTML = 
            `<p style="text-align:center; color:#fc8181;"><strong>Data Load Failed</strong><br>${error.message}</p>`;
    }
}

// --- Modal Control Functionality ---
const modal = document.getElementById('sheetModal');
const openBtn = document.getElementById('openModalBtn');
const closeBtn = document.getElementById('closeModalBtn');

openBtn.addEventListener('click', () => {
    modal.classList.add('active');
    document.body.style.overflow = 'hidden'; // Prevents background page scrolling while spreadsheet is open
});

closeBtn.addEventListener('click', () => {
    modal.classList.remove('active');
    document.body.style.overflow = ''; // Re-enables background scrolling
});

// Close modal if user clicks outside the dashboard wrapper box
modal.addEventListener('click', (e) => {
    if (e.target === modal) {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }
});

fetchAndDisplayRankings();
</script>

</body>
</html>
