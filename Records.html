<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCWR FANTASY FOOTBALL DY-NASTY MANAGER RANKINGS</title>
    <style>
        body { background-color: #1a202c; font-family: 'Inter', sans-serif; color: white; margin: 0; }

        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            width: 95%;
            max-width: 1400px;
            margin: 40px auto;
        }

        .ranking-card {
            background-color: #2d3748;
            border: 3px solid #4a5568;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        /* Rank Highlights */
        .ranking-card[data-rank="1"] { border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .ranking-card[data-rank="2"] { border-color: #C0C0C0; }
        .ranking-card[data-rank="3"] { border-color: #CD7F32; }

        .rank-number {
            position: absolute;
            top: -12px;
            left: -12px;
            background: #1a202c;
            color: #FFD700;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid currentColor;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .manager-info { margin-bottom: 15px; border-bottom: 1px solid #4a5568; padding-bottom: 10px; }
        .real-name { font-size: 1.4rem; font-weight: bold; display: block; }

        .total-score { font-size: 1.8rem; color: #4ade80; margin: 5px 0; font-weight: 800; }
        .total-score span { font-size: 0.8rem; color: #cbd5e0; }

        .stats-sub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.6rem; color: #cbd5e0; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 0.95rem; font-weight: bold; color: #FFD700; }

        .win-bar-container {
            width: 100%;
            height: 8px;
            background: #1a202c;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .win-bar-fill { height: 100%; background: linear-gradient(90deg, #4a5568, #FFD700); transition: width 1s ease-in-out; }

        .info-card { border-color: #4ade80; background-color: #1e293b; }
        .info-header { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .info-desc { font-size: 0.85rem; color: #cbd5e0; font-style: italic; margin-bottom: 15px; line-height: 1.4; }
        .weight-total { color: #4ade80; font-weight: 800; font-size: 1.2rem; margin-top: 10px; text-align: right; border-top: 1px solid #4a5568; padding-top: 5px; }
    </style>
</head>
<body>

<div class="ranking-grid" id="leaderboard">
    <p style="text-align: center; grid-column: 1/-1;">Loading rankings...</p>
</div>

<script>
// The raw Google Sheets CSV URL
const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjIjcUVkLUwsSErcmBR-WHYSu6WxbAlckp2oZOGkDQFoqea7El8QLa2shDlyrUPSAXZtv89DzcMcvk/pub?gid=242455735&single=true&output=csv';

// Using api.allorigins.win to bypass CORS for local file development
const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(sheetUrl)}&_=${Date.now()}`;

async function fetchAndDisplayRankings() {
    console.log("Status: Fetching data via AllOrigins Proxy..."); 
    try {
        const response = await fetch(finalUrl);
        
        if (!response.ok) throw new Error(`Proxy error: ${response.status}`);

        const data = await response.json();
        const csvText = data.contents; // AllOrigins wraps the CSV in 'contents'

        // Parse CSV Rows
        const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "").map(row => {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(cell => cell.replace(/^"(.*)"$/, '$1').trim()) : [];
        });

        const container = document.getElementById('leaderboard');
        container.innerHTML = "";

        // Process data starting from Row 4 (index 3)
        for (let i = 3; i < rows.length; i++) {
            const col = rows[i];
            
            // Validation: Ensure Row has a Rank and a Manager Name
            if (!col[0] || isNaN(col[0]) || !col[1]) continue; 

            const rank = col[0];
            const manager = col[1];
            const totalScore = col[2] || "0";
            
            const winPctPts = col[7] || "0";
            const tpfPts = col[9] || "0";
            const playoffPts = col[13] || "0";
            const champsPts = col[17] || "0";

            container.innerHTML += `
                <div class="ranking-card" data-rank="${rank}">
                    <div class="rank-number">${rank}</div>
                    <div class="manager-info">
                        <span class="real-name">${manager}</span>
                    </div>
                    <div class="total-score">${totalScore} <span>/ 10</span></div>
                    
                    <div class="stats-sub-grid">
                        <div class="stat-item">
                            <span class="stat-label">Win %</span>
                            <span class="stat-value">${winPctPts}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">TPF</span>
                            <span class="stat-value">${tpfPts}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Playoffs</span>
                            <span class="stat-value">${playoffPts}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Champs</span>
                            <span class="stat-value">${champsPts}</span>
                        </div>
                    </div>

                    <div class="win-bar-container">
                        <div class="win-bar-fill" style="width: ${parseFloat(totalScore) * 10}%"></div>
                    </div>
                </div>`;
        }

        // Final Info Card
        container.innerHTML += `
            <div class="ranking-card info-card">
                <div class="info-header">Point Assignment</div>
                <div class="info-desc">
                    How the Rankings Work: Rankings are out of a total of 10 points. 
                    The closer a team's score is to 10, the higher their rank.
                </div>
                <div class="stats-sub-grid">
                    <div class="stat-item"><span class="stat-label">Win %</span><span class="stat-value">2.0</span></div>
                    <div class="stat-item"><span class="stat-label">TPF</span><span class="stat-value">2.0</span></div>
                    <div class="stat-item"><span class="stat-label">TPA (The less the higher)</span><span class="stat-value">1.5</span></div>
                    <div class="stat-item"><span class="stat-label">Playoffs</span><span class="stat-value">1.5</span></div>
                    <div class="stat-item"><span class="stat-label">Champ App</span><span class="stat-value">1.0</span></div>
                    <div class="stat-item"><span class="stat-label">Champs Won</span><span class="stat-value">2.0</span></div>
                </div>
                <div class="weight-total">TOTAL WEIGHT: 10.0</div>
            </div>`;

    } catch (error) {
        console.error("Critical Error:", error);
        document.getElementById('leaderboard').innerHTML = 
            `<p style="grid-column: 1/-1; text-align: center; color: #fc8181;">
                <strong>Data Load Failed</strong><br>
                Please ensure the Google Sheet is "Published to the Web" as a CSV.<br>
                <small>${error.message}</small>
            </p>`;
    }
}

fetchAndDisplayRankings();
</script>

</body>
</html>
