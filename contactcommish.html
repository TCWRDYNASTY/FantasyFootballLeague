<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Commish</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: courier new;
      font-weight: bold;
      background: #1e3159;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 400px;
      background: beige;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .form-image {
      max-width: 100%;
      display: block;
      margin: 0 auto 20px auto;
      border-radius: 8px;
    }

    form label {
      display: block;
      margin-bottom: 15px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
      font-family: inherit;
    }

    button {
      background-color: green;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      width: 100%;
      font-weight: bold;
    }

    button:hover {
      background-color: #005e00; /* Darker green for a smoother hover effect */
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <img src="ainteasy.jpeg" alt="easy" class="form-image" />

    <form action="https://formspree.io/f/mdkgeyod" method="POST" id="messageForm">
      
      <label>
        Your Name (Optional):
        <input type="text" name="Sender_Name" id="senderNameInput" placeholder="Anonymous" />
      </label>
      
      <label>
        Your Message:
        <textarea name="message" id="messageTextarea" rows="6" required placeholder="Type your message here..."></textarea>
      </label>

      <button type="submit" id="submitBtn">Send</button>
    </form>
  </div>

<script>
    // === SERVICE WORKER REGISTRATION ===
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js') 
                .then(registration => {
                    console.log('Service Worker registered successfully!');
                })
                .catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
        });
    }
</script>
</body>
</html>
